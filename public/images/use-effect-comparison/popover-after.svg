<svg width="100%" viewBox="0 0 360 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="280" fill="rgb(28, 28, 26)"/>

  <!-- Title -->
  <text x="180" y="24" text-anchor="middle" style="fill:rgb(93, 202, 165);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:600;">useLayoutEffect — 깜빡임 없음</text>

  <!-- Browser frame -->
  <rect x="20" y="44" width="320" height="216" rx="8" style="fill:rgb(38, 38, 36);stroke:rgb(68, 68, 65);stroke-width:1px;"/>
  <circle cx="38" cy="58" r="5" style="fill:rgb(233, 49, 71);"/>
  <circle cx="54" cy="58" r="5" style="fill:rgb(236, 179, 71);"/>
  <circle cx="70" cy="58" r="5" style="fill:rgb(93, 202, 165);"/>

  <!-- Explanation -->
  <text x="30" y="88" style="fill:rgb(156, 154, 146);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:10px;">paint 전에 위치 계산 완료 → 처음부터 올바른 위치</text>

  <!-- Button (actual anchor) -->
  <rect x="180" y="180" width="80" height="32" rx="6" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:1px;"/>
  <text x="220" y="200" text-anchor="middle" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;">버튼</text>

  <!-- Correct popover above button - solid, correct from start -->
  <rect x="165" y="142" width="110" height="32" rx="6" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:1px;"/>
  <text x="220" y="162" text-anchor="middle" style="fill:rgb(206, 203, 246);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:500;">팝오버</text>

  <!-- Check mark -->
  <text x="282" y="162" style="fill:rgb(93, 202, 165);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:16px;">✓</text>

  <!-- Bottom label -->
  <text x="180" y="245" text-anchor="middle" style="fill:rgb(93, 202, 165);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:500;">처음부터 올바른 위치에 나타난다</text>
</svg>