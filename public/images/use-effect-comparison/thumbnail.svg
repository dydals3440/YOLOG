<svg width="100%" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="0" fill="rgb(28, 28, 26)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250, 249, 245);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:18px;font-weight:600;">useEffect vs useLayoutEffect vs useFocusEffect</text>

  <!-- Pipeline: Render → DOM → useLayoutEffect → Paint → useEffect -->

  <!-- Step 1: Render -->
  <rect x="40" y="100" width="120" height="44" rx="8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.5px;"/>
  <text x="100" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:500;">Render</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="122" x2="190" y2="122" marker-end="url(#arrow)" style="stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Step 2: DOM 변경 -->
  <rect x="190" y="100" width="120" height="44" rx="8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.5px;"/>
  <text x="250" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:500;">DOM 변경</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="122" x2="340" y2="122" marker-end="url(#arrow)" style="stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Step 3: useLayoutEffect (purple) -->
  <rect x="340" y="90" width="160" height="64" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
  <text x="420" y="112" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:600;">useLayoutEffect</text>
  <text x="420" y="134" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:400;">paint 전 · 동기</text>

  <!-- Arrow 3→4 -->
  <line x1="500" y1="122" x2="530" y2="122" marker-end="url(#arrow)" style="stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Step 4: Paint -->
  <rect x="530" y="100" width="100" height="44" rx="8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.5px;"/>
  <text x="580" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:500;">Paint</text>

  <!-- Arrow 4→5 -->
  <line x1="630" y1="122" x2="660" y2="122" marker-end="url(#arrow)" style="stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Step 5: useEffect (teal) -->
  <rect x="660" y="90" width="110" height="64" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
  <text x="715" y="112" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:600;">useEffect</text>
  <text x="715" y="134" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:400;">paint 후 · 비동기</text>

  <!-- Divider line -->
  <line x1="40" y1="200" x2="760" y2="200" style="stroke:rgba(222, 220, 209, 0.15);stroke-width:0.5px;stroke-dasharray:4 6;"/>

  <!-- useFocusEffect section (orange/amber) - separate from pipeline -->
  <text x="400" y="230" text-anchor="middle" dominant-baseline="central" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:12px;font-weight:400;">React Navigation 화면 전환</text>

  <!-- Screen A -->
  <rect x="100" y="260" width="160" height="56" rx="8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.5px;"/>
  <text x="180" y="281" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:500;">Screen A</text>
  <text x="180" y="300" text-anchor="middle" dominant-baseline="central" style="fill:rgb(156, 154, 146);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:400;">할 일 목록</text>

  <!-- Arrow A→B -->
  <line x1="260" y1="288" x2="320" y2="288" marker-end="url(#arrow)" style="stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>
  <text x="290" y="275" text-anchor="middle" dominant-baseline="central" style="fill:rgb(156, 154, 146);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:10px;font-weight:400;">navigate</text>

  <!-- Screen B -->
  <rect x="320" y="260" width="160" height="56" rx="8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.5px;"/>
  <text x="400" y="281" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:500;">Screen B</text>
  <text x="400" y="300" text-anchor="middle" dominant-baseline="central" style="fill:rgb(156, 154, 146);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:400;">할 일 상세</text>

  <!-- Arrow B→A (back) -->
  <path d="M320 310 Q290 340 260 310" fill="none" marker-end="url(#arrow)" style="stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>
  <text x="290" y="348" text-anchor="middle" dominant-baseline="central" style="fill:rgb(156, 154, 146);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:10px;font-weight:400;">뒤로 가기</text>

  <!-- useFocusEffect box (amber/orange) -->
  <rect x="520" y="256" width="220" height="64" rx="8" style="fill:rgb(120, 70, 10);stroke:rgb(236, 179, 71);stroke-width:0.5px;"/>
  <text x="630" y="278" text-anchor="middle" dominant-baseline="central" style="fill:rgb(252, 220, 160);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:13px;font-weight:600;">useFocusEffect</text>
  <text x="630" y="300" text-anchor="middle" dominant-baseline="central" style="fill:rgb(236, 179, 71);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;font-weight:400;">화면 focus 시마다 · 비동기</text>

  <!-- Arrow from Screen A to useFocusEffect -->
  <line x1="260" y1="280" x2="260" y2="280" style="stroke:none;"/>

  <!-- Legend -->
  <rect x="200" y="388" width="12" height="12" rx="2" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
  <text x="218" y="394" dominant-baseline="central" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;">useEffect</text>

  <rect x="330" y="388" width="12" height="12" rx="2" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
  <text x="348" y="394" dominant-baseline="central" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;">useLayoutEffect</text>

  <rect x="500" y="388" width="12" height="12" rx="2" style="fill:rgb(120, 70, 10);stroke:rgb(236, 179, 71);stroke-width:0.5px;"/>
  <text x="518" y="394" dominant-baseline="central" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, system-ui, sans-serif;font-size:11px;">useFocusEffect</text>
</svg>